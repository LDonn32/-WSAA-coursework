<!DOCTYPE html>
<html>
<head>
    <title>Student CRUD</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Student Manager</h1>

<button onclick="loadStudents()">Load Students</button>

<table id="studentTable">
    <thead>
        <tr>
            <th>ID</th><th>Name</th><th>Address</th><th>Email</th><th>Course</th><th>Actions</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<h3>Add Student</h3>
<input id="name" placeholder="Name">
<input id="address" placeholder="Address">
<input id="email" placeholder="Email">
<input id="course" placeholder="Course">
<button onclick="addStudent()">Add</button>

<h3>Edit Student</h3>
<input id="editName" placeholder="Name">
<input id="editAddress" placeholder="Address">
<input id="editEmail" placeholder="Email">
<input id="editCourse" placeholder="Course">
<button onclick="saveStudent()">Save</button>

<script src="app.js"></script>
</body>
</html>
