#<!DOCTYPE html>
<html>
<head>
    <title>School Database</title>

    <!-- ✅ Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-light">

<!-- ✅ Navbar -->
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">School Database Tester</span>
    </div>
</nav>

<div class="container">

    <div class="section">
        <h2>Teachers</h2>

        <button class="btn btn-primary mb-3" onclick="loadTeachers()">Load Teachers</button>

        <table id="teacherTable" class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>ID</th><th>Name</th><th>Class</th><th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <h3>Add Teacher</h3>
        <div class="row g-2">
            <div class="col-md-4">
                <input id="tName" class="form-control" placeholder="Name">
            </div>
            <div class="col-md-4">
                <input id="tClass" class="form-control" placeholder="Class Name">
            </div>
            <div class="col-md-4">
                <button class="btn btn-success w-100" onclick="addTeacher()">Add</button>
            </div>
        </div>
    </div>

    <hr>

    <div class="section">
        <h2>Students</h2>

        <button class="btn btn-primary mb-3" onclick="loadStudents()">Load Students</button>

        <table id="studentTable" class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>ID</th><th>Name</th><th>Class</th><th>Teacher ID</th><th>Qualification</th><th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <h3>Add Student</h3>
        <div class="row g-2">
            <div class="col-md-3">
                <input id="sName" class="form-control" placeholder="Name">
            </div>
            <div class="col-md-3">
                <input id="sClass" class="form-control" placeholder="Class Name">
            </div>
            <div class="col-md-3">
                <input id="sTeacher" class="form-control" placeholder="Teacher ID">
            </div>
            <div class="col-md-3">
                <input id="sQual" class="form-control" placeholder="Qualification Level">
            </div>
            <div class="col-md-12 mt-2">
                <button class="btn btn-success w-100" onclick="addStudent()">Add</button>
            </div>
        </div>
    </div>

</div>

<script src="app.js"></script>

<!-- Optional Bootstrap JS (not required for your app, but nice to have) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
