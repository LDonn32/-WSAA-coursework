<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Management System</title>
  <link rel="stylesheet" href="/static/styles.css">
<link rel="stylesheet" href="/static/styles.css?v=11">


</head>

<body>
  <header class="navbar">
    <h1>Student Manager</h1>
  </header>

  <main class="container">
    <!-- Student Form -->
    <section class="card">
      <h2>Add / Edit Student</h2>
      <form id="student-form" class="form">
        <input type="hidden" id="student-id">

        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Enter full name" required>

        <label for="course">Course</label>
        <input type="text" id="course" placeholder="Enter course" required>

        <label for="address">Address</label>
        <input type="text" id="address" placeholder="Enter address" required>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter email" required>

        <div class="actions">
          <button type="submit" id="submit-btn" class="primary">Add Student</button>
          <button type="button" id="cancel-btn" class="secondary" style="display:none;">Cancel</button>
        </div>
      </form>
    </section>

    <!-- Student Table -->
    <section class="card">
      <h2>Student List</h2>
      <table id="student-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Address</th>
            <th>Email</th>
            <th>Course</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="student-tbody"></tbody>
      </table>
    </section>
  </main>

  <script>
    const API_URL = '/api/students';

    async function loadStudents() {
      try {
        const res = await fetch(API_URL);
        const students = await res.json();
        const tbody = document.getElementById('student-tbody');
        tbody.innerHTML = '';
        students.forEach(s => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${s.id}</td>
            <td>${s.name}</td>
            <td>${s.address}</td>
            <td>${s.email}</td>
            <td>${s.course}</td>
            <td>
              <button class="edit" onclick="editStudent(${s.id})">Edit</button>
              <button class="delete" onclick="deleteStudent(${s.id})">Delete</button>
            </td>`;
          tbody.appendChild(tr);
        });
      } catch (err) {
        console.error('Error loading students:', err);
      }
    }

    document.getElementById('student-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('student-id').value;
      const student = {
        name: document.getElementById('name').value,
        address: document.getElementById('address').value,
        email: document.getElementById('email').value,
        course: document.getElementById('course').value
      };

      if (id) {
        await fetch(`${API_URL}/${id}`, {
          method: 'PUT',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(student)
        });
      } else {
        await fetch(API_URL, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(student)
        });
      }
      resetForm();
      loadStudents();
    });

    async function editStudent(id) {
      const res = await fetch(`${API_URL}/${id}`);
      const s = await res.json();
      document.getElementById('student-id').value = s.id;
      document.getElementById('name').value = s.name;
      document.getElementById('address').value = s.address;
      document.getElementById('email').value = s.email;
      document.getElementById('course').value = s.course;
      document.getElementById('submit-btn').textContent = 'Update Student';
      document.getElementById('cancel-btn').style.display = 'inline-block';
    }

    async function deleteStudent(id) {
      if (!confirm('Are you sure you want to delete this student?')) return;
      await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
      loadStudents();
    }

    function resetForm() {
      document.getElementById('student-form').reset();
      document.getElementById('student-id').value = '';
      document.getElementById('submit-btn').textContent = 'Add Student';
      document.getElementById('cancel-btn').style.display = 'none';
    }

    document.getElementById('cancel-btn').addEventListener('click', resetForm);
    loadStudents();
  </script>
</body>
</html>
